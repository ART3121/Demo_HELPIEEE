<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxo Curricular — Eng. Elétrica UFJF</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/pages/fluxo.css">
</head>
<body class="page-flow">

<div class="flow-header">
  <h1>Fluxo Curricular — Eng. Elétrica: Sistemas Eletrônicos</h1>
  <p>UFJF · 69A · Clique em uma disciplina para ver pré-requisitos e o que ela desbloqueia</p>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot legend-dot--default"></div>
      Disciplina
    </div>
    <div class="legend-item">
      <div class="legend-dot legend-dot--selected"></div>
      Selecionada
    </div>
    <div class="legend-item">
      <div class="legend-dot legend-dot--prereq"></div>
      Pré-requisito
    </div>
    <div class="legend-item">
      <div class="legend-dot legend-dot--unlocks"></div>
      Desbloqueia
    </div>
    <div class="legend-item">
      <div class="legend-dot legend-dot--done"></div>
      Cursada ✓
    </div>
  </div>
</div>

<div class="controls">
  <label>Mostrar setas:</label>
  <button class="btn-toggle active" id="btn-arrows" type="button">Ativado</button>
  <div class="sep"></div>
  <label>Modo:</label>
  <button class="btn-toggle active" id="btn-mode-nav" type="button">Navegar</button>
  <button class="btn-toggle" id="btn-mode-mark" type="button">Marcar cursadas</button>
  <div class="info-bar" id="info-bar">Clique em uma disciplina</div>
</div>

<div class="flow-scroll">
  <div class="flow-grid" id="flow-grid">
    <svg class="arrows-svg" id="arrows-svg"></svg>
  </div>
</div>

<div class="bottom-bar">
  <span>Disciplinas cursadas: <strong id="done-count">0</strong> / <strong id="total-count">0</strong></span>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <span id="credits-done">0 créditos concluídos</span>
  <button class="btn-reset" id="btn-reset" type="button">Resetar progresso</button>
</div>

<div class="tooltip" id="tooltip"></div>

<script src="../assets/js/pages/fluxo.js" defer></script>
</body>
</html>
